services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.1
    container_name: promo-snatcher-evolution
    ports:
      - "127.0.0.1:3200:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - SERVER_URL=http://promo-snatcher-evolution:8080
      - SERVER_PORT=8080
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS:-evolution}@promo-snatcher-evo-postgres:5432/evolution?schema=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://promo-snatcher-evo-redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evo
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - LOG_LEVEL=ERROR,WARN
      - LOG_BAILEYS=error
      - CONFIG_SESSION_PHONE_CLIENT=Promo Snatcher
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - evo_instances:/evolution/instances
    depends_on:
      - evo-postgres
      - evo-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s   # Pi é mais lento pra subir

  evo-postgres:
    image: postgres:15-alpine
    container_name: promo-snatcher-evo-postgres
    # Tuning para baixo consumo de RAM no Pi
    command: >
      postgres
      -c shared_buffers=32MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
      -c wal_buffers=4MB
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS:-evolution}
    volumes:
      - evo_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  evo-redis:
    image: redis:7-alpine
    container_name: promo-snatcher-evo-redis
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - evo_redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96m

  backend:
    build: ./backend
    container_name: promo-snatcher-backend
    # shm_size necessário para o Chromium (Amazon scraping) não crashar no Pi
    shm_size: '128mb'
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - SCAN_INTERVAL=${SCAN_INTERVAL:-30}
      - TZ_NAME=${TZ_NAME:-America/Sao_Paulo}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - EVOLUTION_URL=http://promo-snatcher-evolution:8080
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-default}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - AMZ_TRACKING_ID=${AMZ_TRACKING_ID:-}
      - PUBLIC_URL=${PUBLIC_URL}
      - ML_CLIENT_ID=${ML_CLIENT_ID:-}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET:-}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s   # Chromium ARM demora mais pra inicializar

  redirect:
    build: ./redirect
    container_name: promo-snatcher-redirect
    volumes:
      - ./backend/data:/data:ro   # SQLite read-only — não compete com Python
    environment:
      - DB_PATH=/data/app.db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32m
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build: ./frontend
    container_name: promo-snatcher-frontend
    ports:
      - "${FRONTEND_PORT:-6060}:80"
    environment:
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
    depends_on:
      backend:
        condition: service_healthy
      redirect:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: promo-snatcher-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    profiles: [tunnel]
    depends_on:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  evo_instances:
  evo_pg_data:
  evo_redis_data:
