services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.1
    container_name: promo-snatcher-evolution
    ports:
      - "127.0.0.1:3200:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - SERVER_URL=http://promo-snatcher-evolution:8080
      - SERVER_PORT=8080
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS:-evolution}@promo-snatcher-evo-postgres:5432/evolution?schema=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://promo-snatcher-evo-redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evo
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - LOG_LEVEL=ERROR,WARN
      - LOG_BAILEYS=error
      - CONFIG_SESSION_PHONE_CLIENT=Promo Snatcher
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - evo_instances:/evolution/instances
    depends_on:
      - evo-postgres
      - evo-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  evo-proxy:
    image: nginx:alpine
    container_name: promo-snatcher-evo-proxy
    network_mode: "service:evolution"
    volumes:
      - ./evo-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - evolution
    restart: unless-stopped

  evo-postgres:
    image: postgres:15-alpine
    container_name: promo-snatcher-evo-postgres
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS:-evolution}
    volumes:
      - evo_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  evo-redis:
    image: redis:7-alpine
    container_name: promo-snatcher-evo-redis
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - evo_redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: promo-snatcher-backend
    volumes:
      - ./backend/data:/app/data
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/var/run/podman.sock:ro
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - SCAN_INTERVAL=${SCAN_INTERVAL:-30}
      - TZ_NAME=${TZ_NAME:-America/Sao_Paulo}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - EVOLUTION_URL=http://promo-snatcher-evolution:8080
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-default}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - AMZ_TRACKING_ID=${AMZ_TRACKING_ID:-}
      - PUBLIC_URL=${PUBLIC_URL:-https://snatcher.autibequi.com}
      - ML_CLIENT_ID=${ML_CLIENT_ID:-}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET:-}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: promo-snatcher-frontend
    environment:
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: promo-snatcher-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend

volumes:
  evo_instances:
  evo_pg_data:
  evo_redis_data:
