services:
  waha:
    image: devlikeapro/waha
    container_name: promo-snatcher-waha
    ports:
      - "3200:3000"
    volumes:
      - waha_data:/app/.sessions
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      # WEBJS suporta foto de grupo mas nao cria grupos — usar NOWEB
      - WAHA_LOG_LEVEL=warn
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/server/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: promo-snatcher-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - SCAN_INTERVAL=${SCAN_INTERVAL:-30}
      - TZ_NAME=${TZ_NAME:-America/Sao_Paulo}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - WAHA_URL=http://promo-snatcher-waha:3000
      - WAHA_SESSION=${WAHA_SESSION:-default}
      - WAHA_API_KEY=${WAHA_API_KEY:-}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - AUTH_SECRET=${AUTH_SECRET:-promo-snatcher-secret-change-me}
    depends_on:
      waha:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: promo-snatcher-frontend
    ports:
      - "6060:80"
      - "6061:8081"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: promo-snatcher-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend
      - waha

volumes:
  waha_data:
