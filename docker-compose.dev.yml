services:
  waha:
    image: devlikeapro/waha
    container_name: promo-snatcher-waha
    ports:
      - "3200:3000"
    volumes:
      - waha_data:/app/.sessions
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WAHA_LOG_LEVEL=warn
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header \"X-Api-Key: $WAHA_API_KEY\" http://localhost:3000/api/server/status"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: ./backend
    container_name: promo-snatcher-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - SCAN_INTERVAL=${SCAN_INTERVAL:-30}
      - TZ_NAME=${TZ_NAME:-America/Sao_Paulo}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - WAHA_URL=http://promo-snatcher-waha:3000
      - WAHA_SESSION=${WAHA_SESSION:-default}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - AMZ_TRACKING_ID=${AMZ_TRACKING_ID:-}
      - PUBLIC_URL=${PUBLIC_URL:-https://snatcher.autibequi.com}
      - ML_CLIENT_ID=${ML_CLIENT_ID:-}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET:-}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      waha:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: promo-snatcher-frontend
    working_dir: /app
    ports:
      - "6060:80"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 80"]
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: promo-snatcher-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend
      - waha

volumes:
  waha_data:
  frontend_node_modules:
