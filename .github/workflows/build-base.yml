name: Build base image → ghcr.io

on:
  # Rebuild when heavy deps change
  push:
    branches: [main]
    paths:
      - 'backend/requirements.txt'
      - 'backend/Dockerfile.base'
  # Manual trigger (first time or forced rebuild)
  workflow_dispatch:

concurrency:
  group: build-base-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/autibequi/promosnatcher-base

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fallback: se rodar em x86 runner, QEMU permite cross-build ARM64.
      # Em runner ARM64 nativo, este step e no-op.
      - name: Setup QEMU (fallback para x86 runners)
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push base image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base
