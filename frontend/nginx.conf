# Resolve DNS dinamicamente — sem cache de startup
# DNS Podman: 10.89.4.1 | Docker: 127.0.0.11
# Detecta automaticamente via variável de ambiente se disponível
resolver 10.89.4.1 valid=10s ipv6=off;

# Promo Hunter — porta 80
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $backend http://promo-hunter-backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location /evolution/ {
        set $evo http://promo-hunter-evolution:8080;
        proxy_pass $evo/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Evolution Manager — porta 8081 (SPA na raiz)
server {
    listen 8081;

    location / {
        set $evo http://promo-hunter-evolution:8080;
        proxy_pass $evo/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
