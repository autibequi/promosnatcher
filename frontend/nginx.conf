server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://promo-hunter-backend:8000/api/;
        proxy_set_header Host $host;
    }

    location /evolution/ {
        proxy_pass http://promo-hunter-evolution:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Evolution Manager — reescreve assets para /evolution/assets/
    location /manager {
        proxy_pass http://promo-hunter-evolution:8080/manager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        sub_filter 'src="/assets/' 'src="/evolution/assets/';
        sub_filter 'href="/assets/' 'href="/evolution/assets/';
        sub_filter_once off;
    }

    # Assets da Evolution (CSS/JS carregados pelo manager)
    location /evolution/assets/ {
        proxy_pass http://promo-hunter-evolution:8080/assets/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
